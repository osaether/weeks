# Geometrically-consistent microstrip for the Z0 sanity check
# (python3 -m tools.microstrip_z0 examples/test_microstrip.yaml).
#
# The signal trace bottom sits exactly substrate_h (200 um) above the top of
# the 2 um ground plane, so y = 2e-6 + 200e-6 = 202e-6. This makes the actual
# trace-to-ground gap match substrate_h, which is required for weeks' Z0
# (L from geometry, eff_er from substrate_h) to be comparable to the
# Hammerstad-Jensen closed form. weeks and H-J agree to ~0.03% here.

frequency: 30e6  # 30 MHz

conductors:
  # Ground plane (line0)
  - name: line0
    w: 2800e-6
    h: 2.0e-6
    x: 0.0
    y: 0.0
    nw: 201
    nh: 3
    b: 0.2
    er: 4.4
    substrate_h: 200e-6
    tan_delta: 0.02

  # Signal trace, bottom at y = ground_top (2 um) + substrate_h (200 um)
  - name: line1
    w: 150e-6
    h: 18e-6
    x: 1325e-6
    y: 202e-6
    nw: 21
    nh: 7
    b: 0.9
    er: 4.4
    substrate_h: 200e-6
    tan_delta: 0.02
