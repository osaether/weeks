# Single trace over ground — minimal case for cross-checking against FastHenry.
# Ground plane + one signal line (matrices are 1x1).

frequency: 30e6  # 30 MHz

conductors:
  # Ground plane (line0)
  - name: line0
    w: 2800e-6
    h: 2.0e-6
    x: 0.0
    y: 0.0
    nw: 201
    nh: 3
    b: 0.2
    er: 4.4
    tan_delta: 0.02

  # Signal trace
  - name: line1
    w: 150e-6
    h: 18e-6
    x: 600e-6
    y: 77e-6
    nw: 21
    nh: 7
    b: 0.9
    er: 4.4
    tan_delta: 0.02
