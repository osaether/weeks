name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libmeschach-dev libyaml-dev

      - name: Check dependencies
        run: make check-deps

      - name: Build
        run: make

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Run cross-check harness unit tests
        run: |
          python -m pip install --upgrade pip pytest
          python -m pytest tools/fh_crosscheck/ -q
